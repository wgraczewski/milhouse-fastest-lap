<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Fastest Lap — Milhouse</title>
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>

  <div class="page">

    <!-- ── Banner ───────────────────────────────────────── -->
    <div class="banner">
      <img src="assets/banner-fastest-lap.png" alt="Fastest Lap" class="banner-img" />
    </div>

    <div class="content">

      <!-- ── Sidebar: logos/status + prizes ───────────────── -->
      <div class="sidebar-top">
        <div class="header-logos">
          <img src="assets/logo-wordmark.png" class="logo-wordmark" alt="Milhouse" />
          <img src="assets/logo-gold.png"     class="logo-gold"     alt="GT Logo" />
        </div>
        <div class="live-badge">
          <span class="live-dot"></span>
          Qualifying &nbsp;Live until 9 PM
        </div>
      </div>

      <div class="prize-list" id="prize-list"></div>

      <!-- ── Leaderboard ──────────────────────────────────── -->
      <div class="leaderboard-panel" role="table" aria-label="Lap time leaderboard">
        <div class="leaderboard-list" id="lb-tbody">
          <div class="leaderboard-empty">
            <span class="empty-icon">&#127937;</span>
            Loading...
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Scripts: config first, then app -->
  <script src="config.js?v=3"></script>
  <script src="app.js?v=5"></script>

</body>
</html>
