<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Fastest Lap — Milhouse</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-logos">
      <img src="assets/logo-gold.png"     class="logo-gold"     alt="GT Logo" />
      <img src="assets/logo-wordmark.png" class="logo-wordmark" alt="Milhouse" />
    </div>

    <div class="header-title">
      <h1>Fastest Lap</h1>
      <p>Live Leaderboard</p>
    </div>

    <div class="live-badge">
      <span class="live-dot"></span>
      LIVE
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="main">

    <!-- Leaderboard -->
    <div class="leaderboard-header">
      <h2>Classification</h2>
      <span class="driver-count" id="driver-count"></span>
    </div>

    <table class="leaderboard-table" aria-label="Lap time leaderboard">
      <thead>
        <tr>
          <th class="col-pos">POS</th>
          <th>DRIVER</th>
          <th class="col-time">TIME</th>
          <th class="col-gap">GAP</th>
        </tr>
      </thead>
      <tbody id="lb-tbody">
        <tr>
          <td colspan="4">
            <div class="leaderboard-empty">
              <span class="empty-icon">&#127937;</span>
              Loading...
            </div>
          </td>
        </tr>
      </tbody>
    </table>

  </main>

  <!-- Scripts: config first, then app -->
  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
